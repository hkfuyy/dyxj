<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>钓鱼相机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        /* 背景装饰圆点 */
        .dot-blue {
            position: absolute;
            top: 0;
            left: 0;
            width: 200px;
            height: 200px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 50%;
            filter: blur(30px);
        }
        .dot-yellow {
            position: absolute;
            bottom: 10%;
            left: 0;
            width: 80px;
            height: 80px;
            background: rgba(255, 204, 0, 0.3);
            border-radius: 50%;
            filter: blur(20px);
        }
        .dot-green {
            position: absolute;
            top: 50%;
            right: 10%;
            width: 40px;
            height: 40px;
            background: rgba(76, 217, 100, 0.4);
            border-radius: 50%;
            filter: blur(15px);
        }
        .container {
            text-align: center;
            z-index: 1;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: #e6f2ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2196F3;
            font-size: 24px;
            /* 这里你可以换成真实图标，示例用文字替代 */
        }
        .app-icon img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            color: #333333;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .tip-text {
            font-size: 18px;
            color: #666666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .download-btn {
            display: inline-block;
            width: 260px;
            padding: 15px 0;
            background: #2196F3;
            color: #ffffff;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s ease;
        }
        .download-btn:hover {
            background: #1976D2;
        }
    </style>
    <!-- 以下为xinstall集成代码，请在html文档中尽量靠前放置，加快初始化过程（请完整拷贝并根据自己的应用情况修改appkey和button参数，注释内附加功能按需使用） -->
    <!-- 直接引用下面的cdn加速链接才能得到及时的更新；请勿将此js文件下载到自己的服务器-->
    <script type="text/javascript" charset="UTF-8" src="https://cdn.xinstall.com/xinstall.js"></script>
    <script type="text/javascript">
      /*Web页面传参数据格式为：json string/js Object；应用被拉起或是首次安装时，客户端使用相应api可获取此数据，数据以uo方式接收*/
      var data = XInstall.parseUrlParams(); //xinstall.js中提供的工具函数，解析url中的所有查询参数，函数返回格式为js Object
      new XInstall({
        /*xinstall中应用的唯一标识，用于识别您的应用*/
        appKey : "jv05awjn",
        /*—————————————————分割线——————————————————*/
        /*附加功能1：特殊情况无法直接跳转下载时，引导打开三方浏览器下载的遮罩层可用以下方法自定义样式*/
        //mask:function(){
        //  return "<div style='background:rgba(0,0,0,.5);position:fixed;left:0;top:0;filter:alpha(opacity=50);width:100%;height:100%;z-index:9999;'><div style='text-align:right; margin-top:1%; margin-right:5%;'><img style='width:70%; margin:0 auto;' src='https://cdn.xinstall.com/image/no_safari.png'/></div></div>"
        //},
        /*—————————————————分割线——————————————————*/
        /*xinstall初始化完成的回调函数*/
        onready : function() {
          var m = this, button = document.getElementById("downloadButton");
          /*用户点击您页面上的某个按钮时(假定您的按钮id为downloadButton)，安装app*/
          /*
            警告：
            1、被绑定使用xinstall下载拉起的id，不需要额外再单独写下载相关的处理，如使用a标签href另外下载或者使用js绑定点击使用额外的下载，这样会导致拉起和数据传递失效！！！
            2、按钮id值请勿与附加功能2中重复使用，否则将导致功能失效！！
          */
          button.onclick = function() {
            m.wakeupOrInstall();
          }
        }
      }, data);
    </script>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="dot-blue"></div>
    <div class="dot-yellow"></div>
    <div class="dot-green"></div>

    <div class="container">
        <!-- 应用图标：这里你可以替换成真实图片，示例用文字 -->
        <div class="app-icon">
            <!-- 替换为你的图标地址 -->
            <!-- <img src="https://your-domain.com/icon.png" alt="钓鱼相机"> -->
            Fishing<br>Camera
        </div>
        <h1>钓鱼相机</h1>
        <p class="tip-text">如跳转失败，右上角请使用浏览器打开</p>
        <button id="downloadButton" class="download-btn">打开/下载APP</button>
    </div>
</body>
</html>
