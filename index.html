<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>钓鱼相机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
        }
        .page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .app-img {
            width: 220px;
            height: auto;
            border-radius: 16px;
            margin-bottom: 40px;
        }
        .title {
            font-size: 26px;
            color: #333;
            margin-bottom: 15px;
        }
        .desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 50px;
        }
        .download-btn {
            width: 240px;
            padding: 16px 0;
            background: #007aff;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>

<!-- XInstall 核心代码（你提供的，已完美嵌入） -->
<script type="text/javascript" charset="UTF-8" src="https://cdn.xinstall.com/xinstall.js"></script>
<script type="text/javascript">
  var data = XInstall.parseUrlParams();
  new XInstall({
    appKey : "jv05awjn",
    onready : function() {
      var m = this, button = document.getElementById("downloadButton");
      button.onclick = function() {
        m.wakeupOrInstall();
      }
    }
  }, data);
</script>

</head>
<body>

<div class="page">
    <!-- 这里是你上传到 GitHub 的图片 -->
    <img class="app-img" src="b924da1c996f4a01b7abc7ae246a0d77.jpg">
    
    <h1 class="title">钓鱼相机</h1>
    <p class="desc">跳转失败请使用浏览器打开</p>
    
    <!-- 下载按钮 -->
    <button id="downloadButton" class="download-btn">打开 / 下载APP</button>
</div>

</body>
</html>
